<ng-container *ngIf="vm$ | async as vm">
  <ng-container *ngIf="vm.canView; else noPermission">
    <section class="ps-search">
      <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
        <label class="ps-field">
          <span class="ps-label">キーワード</span>
          <input type="text" formControlName="keyword" />
        </label>
        <label class="ps-field">
          <span class="ps-label">カテゴリID</span>
          <input type="text" formControlName="categoryId" />
        </label>
        <div class="ps-search-actions">
          <button type="submit" [disabled]="vm.saving">Search</button>
          <button type="button" (click)="onClear()" [disabled]="vm.saving">Clear</button>
        </div>
      </form>
    </section>

    <div class="ps-panes">
      <aside class="ps-tree-pane">
        <div class="ps-loading" *ngIf="vm.loading">読み込み中...</div>
        <div class="ps-empty" *ngIf="vm.isEmpty && !vm.loading">該当するデータがありません。</div>
        <ng-container
          *ngTemplateOutlet="
            treeTpl;
            context: { $implicit: vm.treeNodes, selectedId: vm.selectedNodeId, disabled: vm.saving }
          "
        ></ng-container>
      </aside>

      <section class="ps-detail-pane">
        <div
          class="ps-error"
          *ngIf="vm.error && !vm.showConcurrentUpdate"
          [textContent]="vm.errorMessage"
        ></div>

        <div class="ps-concurrent" *ngIf="vm.showConcurrentUpdate">
          <p class="ps-concurrent-message">
            他の利用者によって製品情報が更新されています。最新情報を再取得してください。
          </p>
          <button type="button" (click)="onReload()">最新情報を再取得</button>
        </div>

        <form
          class="ps-detail-form"
          [formGroup]="form"
          (ngSubmit)="onSave()"
          *ngIf="vm.detail as detail"
        >
          <label class="ps-field">
            <span class="ps-label">製品名</span>
            <input type="text" formControlName="productName" />
          </label>
          <label class="ps-field">
            <span class="ps-label">製品コード</span>
            <input type="text" formControlName="productCode" />
          </label>
          <label class="ps-field">
            <span class="ps-label">価格</span>
            <input type="number" formControlName="price" />
          </label>
          <label class="ps-field">
            <span class="ps-label">説明</span>
            <input type="text" formControlName="description" />
          </label>
          <label class="ps-field">
            <span class="ps-label">リビジョン</span>
            <input type="number" formControlName="revision" />
          </label>

          <div class="ps-detail-actions" *ngIf="vm.canUpdate">
            <button type="submit" [disabled]="!vm.canSave || vm.saving">Save</button>
            <button type="button" (click)="onCancel()" [disabled]="vm.saving">Cancel</button>
          </div>
        </form>
      </section>
    </div>
  </ng-container>

  <ng-template #noPermission>
    <p class="ps-no-permission">この画面を表示する権限がありません。</p>
  </ng-template>
</ng-container>

<ng-template #treeTpl let-nodes let-selectedId="selectedId" let-disabled="disabled">
  <ul class="ps-tree-level">
    <li *ngFor="let node of nodes; trackBy: trackByNodeId" class="ps-tree-item">
      <div class="ps-node" [class.selected]="node.productId === selectedId">
        <button
          type="button"
          class="ps-toggle"
          *ngIf="node.children && node.children.length"
          (click)="onToggleNode(node)"
          [textContent]="isExpanded(node) ? '−' : '+'"
        ></button>
        <span
          class="ps-node-label"
          (click)="disabled ? null : onSelectNode(node)"
          [textContent]="node.productName + ' ' + node.productCode"
        ></span>
      </div>
      <ng-container *ngIf="node.children && node.children.length && isExpanded(node)">
        <ng-container
          *ngTemplateOutlet="
            treeTpl;
            context: { $implicit: node.children, selectedId: selectedId, disabled: disabled }
          "
        ></ng-container>
      </ng-container>
    </li>
  </ul>
</ng-template>
